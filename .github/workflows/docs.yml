name: Docs

# Build the DocC documentation on every push to main and upload it as a
# downloadable artifact. The repo is PRIVATE, so GitHub Pages isn't available on
# the current plan — docs are not published; build them locally with:
#   swift package --disable-sandbox preview-documentation --target ThemeKit
# This job's value is catching broken doc comments / DocC links in CI, and
# producing a browsable archive reviewers can download.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build DocC
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # The package needs Swift 6.2; pick the newest Xcode the runner ships.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Static-hosting transform (no base path) → a self-contained, browsable
      # site. Download the artifact and serve it, e.g. `python3 -m http.server`.
      - name: Build DocC (static hosting)
        run: |
          swift package --disable-sandbox \
            generate-documentation \
            --target ThemeKit \
            --transform-for-static-hosting \
            --output-path ./docs-out

      # DocC emits operator pages whose filenames contain ':' (e.g.
      # `!=(_:_:).json`), which actions/upload-artifact rejects. Tar the site into
      # a single file first so those names live inside the archive.
      - name: Archive DocC site
        run: tar -czf ThemeKit-docc.tgz -C docs-out .

      - name: Upload DocC artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThemeKit-docc
          path: ThemeKit-docc.tgz
          retention-days: 14
