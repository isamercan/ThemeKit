name: Docs

# Build the DocC documentation on demand and upload it as a downloadable
# artifact. The repo is PRIVATE, so GitHub Pages isn't available on the current
# plan — docs are not published. DocC builds on an expensive macOS runner (10×),
# so this is MANUAL-only (workflow_dispatch) rather than on every push to main —
# trigger it from the Actions tab when you want a fresh archive, or build locally:
#   swift package --disable-sandbox preview-documentation --target ThemeKit
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build DocC
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # The package needs Swift 6.2; pick the newest Xcode the runner ships.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Static-hosting transform for two modules under one artifact. Each site
      # lives in its own subdir, so it needs a matching --hosting-base-path or DocC
      # emits absolute /js//css asset URLs that 404 under the subpath. Download the
      # artifact, serve `docs-out` (e.g. `python3 -m http.server`), and open
      # `/themekit/` or `/themekitcore/`.
      - name: Build DocC (static hosting)
        run: |
          swift package --disable-sandbox \
            generate-documentation \
            --target ThemeKit \
            --transform-for-static-hosting \
            --hosting-base-path themekit \
            --output-path ./docs-out/themekit
          swift package --disable-sandbox \
            generate-documentation \
            --target ThemeKitCore \
            --transform-for-static-hosting \
            --hosting-base-path themekitcore \
            --output-path ./docs-out/themekitcore

      # DocC emits operator pages whose filenames contain ':' (e.g.
      # `!=(_:_:).json`), which actions/upload-artifact rejects. Tar the site into
      # a single file first so those names live inside the archive.
      - name: Archive DocC site
        run: tar -czf ThemeKit-docc.tgz -C docs-out .

      - name: Upload DocC artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThemeKit-docc
          path: ThemeKit-docc.tgz
          retention-days: 14
