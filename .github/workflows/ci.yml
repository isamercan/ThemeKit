name: CI

# Every push to main and every PR runs the full matrix. A component library is
# someone else's dependency: nothing merges unless it builds and tests green on
# both platforms we ship (iOS 17+, macOS 14+) and passes lint.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel superseded runs on the same ref so PRs don't queue up stale jobs.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin the toolchain so a runner image bump can't silently change our compiler.
  DEVELOPER_DIR: /Applications/Xcode_26.app/Contents/Developer

jobs:
  # ---------------------------------------------------------------------------
  # SwiftPM build + test on macOS. Fast, headless, runs the full logic/theme/
  # validation suite. This is the gate that must always be green.
  # ---------------------------------------------------------------------------
  spm-macos:
    name: SPM build & test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build --build-tests

      - name: Test
        run: swift test --skip-build --enable-code-coverage

  # ---------------------------------------------------------------------------
  # iOS compile + test on a pinned simulator. Catches iOS-only API use and is
  # the host the snapshot suite renders against (deterministic device + OS).
  # ---------------------------------------------------------------------------
  ios:
    name: Build & test (iOS Simulator)
    runs-on: macos-15
    env:
      # Pin device + OS so snapshot rendering is reproducible across runs.
      DESTINATION: platform=iOS Simulator,name=iPhone 16,OS=18.2
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-ios-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-ios-

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -scheme GlobalUIComponents \
            -destination "$DESTINATION" \
            | xcbeautify || xcodebuild build-for-testing \
            -scheme GlobalUIComponents \
            -destination "$DESTINATION"

      - name: Test on iOS Simulator
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -scheme GlobalUIComponents \
            -destination "$DESTINATION" \
            | xcbeautify || xcodebuild test-without-building \
            -scheme GlobalUIComponents \
            -destination "$DESTINATION"

  # ---------------------------------------------------------------------------
  # Style gate. Fails the PR on lint violations so review stays about behaviour.
  # ---------------------------------------------------------------------------
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      # Non-strict: error-level violations block the PR; warnings surface as
      # annotations and are burned down over time (see .swiftlint.yml). New code
      # that introduces an error-level violation fails here.
      - name: Lint
        run: swiftlint lint --reporter github-actions-logging

  # ---------------------------------------------------------------------------
  # Public-API breakage detection. Informational on PRs (a breaking change is
  # sometimes intended) but surfaces every change to the public surface so the
  # version bump is a conscious decision. See docs/API-STABILITY.md.
  # ---------------------------------------------------------------------------
  api-breakage:
    name: API breakage check
    runs-on: macos-15
    # Don't block merges; this is a heads-up that drives the SemVer decision.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Diagnose API breaking changes vs base
        run: |
          BASELINE="${{ github.event.pull_request.base.sha || 'origin/main' }}"
          scripts/check-api.sh "$BASELINE"
