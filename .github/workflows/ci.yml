name: CI

# Cost-aware matrix. A component library is someone else's dependency, so nothing
# merges unless it's green — but macOS runners bill at 10× on a private repo, so we
# spend them deliberately:
#   • main push  → spm-macos + lint           (1× macOS, 1× Linux)
#   • pull req   → + ios + api-breakage        (full gate before merge)
# DerivedData is cached, redundant runs are cancelled, and doc-only changes skip CI.
# The same gates run for $0 locally via `scripts/ci.sh` / `make ci` — see docs/CI.md.
on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', 'wiki/**', '.gitignore']
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', 'wiki/**', '.gitignore']
  workflow_dispatch: {}

concurrency:
  # Cancel superseded runs on the same ref so PRs don't queue up stale jobs (and
  # don't burn minutes on commits that have already been replaced).
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # SwiftPM build + test on macOS. Fast, headless, runs the full logic/theme/
  # validation suite. The always-on gate that must be green on every push & PR.
  # ---------------------------------------------------------------------------
  spm-macos:
    name: SPM build & test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/swift-setup
        with:
          cache-key: spm

      # Default traits = empty, so this proves the zero-dependency CORE (plus the
      # `#if canImport`-guarded, now-empty add-on modules) still compiles with no
      # third-party packages resolved — the guarantee the "zero dependencies" claim
      # rests on. See docs/guides/installation for the opt-in add-on traits.
      - name: Build (core — default traits, zero third-party dependencies)
        run: swift build

      # Opt every trait back on to actually exercise the ThemeKitLottie add-on and
      # run the full logic/theme/validation suite with the add-ons present.
      # (ThemeKitCalendar/Almanac is iOS-only, so it stays empty on macOS and is
      # compiled on the iOS lane below.)
      - name: Build & test (all traits — add-ons enabled)
        run: |
          set -o pipefail
          swift build --enable-all-traits --build-tests
          swift test --skip-build --enable-all-traits 2>&1 | tee test.log
          PASSED=$(grep -oE 'Executed [0-9]+ tests' test.log | tail -1 || echo 'tests run')
          echo "### ✅ SPM (macOS) — $PASSED" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # iOS compile + test on a simulator — catches iOS-only API use. PR-only: it
  # gates merges, and re-running it on every already-merged main push is wasted
  # macOS spend. The opt-in snapshot suite (RUN_SNAPSHOTS) skips here; see
  # docs/SNAPSHOT-TESTING.md.
  # ---------------------------------------------------------------------------
  ios:
    name: Build & test (iOS Simulator)
    if: github.event_name == 'pull_request'
    runs-on: macos-15
    env:
      DESTINATION: platform=iOS Simulator,name=iPhone 16
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/swift-setup
        with:
          cache-key: ios

      # The *-Package scheme is the one configured for the test action (the plain
      # ThemeKit scheme builds only the library product). This validates the core on
      # iOS. NOTE: xcodebuild can't toggle SwiftPM package traits, so the trait-gated
      # ThemeKitCalendar/ThemeKitLottie add-ons compile empty here; their iOS code is
      # exercised by the Demo app (open it and enable the Calendar trait) — see
      # Demo/…/CalendarDemos.swift. Coverage-restore for this lane is tracked separately.
      - name: Build for iOS Simulator
        run: |
          xcodebuild build-for-testing \
            -scheme ThemeKit-Package \
            -destination "$DESTINATION" \
            -quiet

      - name: Test on iOS Simulator
        run: |
          xcodebuild test-without-building \
            -scheme ThemeKit-Package \
            -destination "$DESTINATION" \
            -quiet

  # ---------------------------------------------------------------------------
  # ThemeKit MCP server (mcp/) — pure Node/TS, so it runs on Linux (1× minutes),
  # no Xcode/Swift needed. `npm test` = `tsc` (typecheck + build) then the
  # node:test suites (datagen output, figma codegen, WCAG/contrast, config rules)
  # against the committed mcp/data/themekit.json + fixtures.
  # ---------------------------------------------------------------------------
  mcp:
    name: MCP server (Node/TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - name: Install
        working-directory: mcp
        run: npm ci
      - name: Typecheck + test
        working-directory: mcp
        run: |
          set -o pipefail
          npm test 2>&1 | tee mcp-test.log
          PASSED=$(grep -oE 'pass [0-9]+' mcp-test.log | tail -1 || echo 'tests run')
          echo "### ✅ MCP (Node/TS) — $PASSED" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Style gate on Linux (1× minutes) via the official SwiftLint image — no Xcode
  # needed. Non-strict: error-level violations block; warnings are annotations.
  # ---------------------------------------------------------------------------
  lint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        run: |
          docker run --rm -v "$PWD:/work" -w /work \
            ghcr.io/realm/swiftlint:latest \
            swiftlint lint --reporter github-actions-logging

  # ---------------------------------------------------------------------------
  # Variant-matrix naming gate (ADR-3): public modifier signatures must feed
  # their color/variant/size axes tokens (SemanticColor / enums), never raw
  # Color/CGFloat. Pure grep → Linux (1× minutes), PR-only, and informational —
  # the same policy as the api-breakage job (drift becomes a ::warning, not a
  # red build; deprecate-and-forward or allowlist to clear it).
  # ---------------------------------------------------------------------------
  variant-naming:
    name: Variant-matrix naming
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check modifier signatures against the variant-matrix contract
        run: |
          scripts/check-variant-naming.sh \
            || echo "::warning::Variant-matrix naming drift — a color/variant/size axis takes a raw Color/CGFloat. Token-feed it, deprecate-and-forward, or allowlist a documented genuine dimension (scripts/check-variant-naming.sh, ADR-3)."

  # ---------------------------------------------------------------------------
  # Public-API breakage detection. PR-only (diffs against the PR base) and
  # informational — a public-API change is often intended. See docs/API-STABILITY.md.
  # ---------------------------------------------------------------------------
  api-breakage:
    name: API breakage check
    if: github.event_name == 'pull_request'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/swift-setup
        with:
          cache-key: api
      - name: Diagnose API breaking changes vs base
        run: |
          BASELINE="${{ github.event.pull_request.base.sha || 'origin/main' }}"
          scripts/check-api.sh "$BASELINE" \
            || echo "::warning::Public API changed vs base — confirm the SemVer bump (see docs/API-STABILITY.md)."

  # ---------------------------------------------------------------------------
  # Brand-neutrality & i18n gate — the catalog is brand-neutral and English-only.
  # HARD-fails on a leaked brand name ("etstur") or Turkish-language string in
  # Swift source/tests (advisory raw-color/URLSession counts are non-blocking).
  # See THEMEKIT_COMPONENT_AUDIT.md.
  # ---------------------------------------------------------------------------
  neutrality:
    name: Brand neutrality (i18n)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for brand / Turkish-language leaks
        run: scripts/check-neutrality.sh
